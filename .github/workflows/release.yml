name: Package librga

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package librga
        run: |
          mkdir -p pkg/usr/include/rga pkg/usr/lib/aarch64-linux-gnu/pkgconfig

          # Copy headers
          cp include/*.h pkg/usr/include/rga/

          # Copy prebuilt library
          cp libs/Linux/gcc-aarch64/librga.so pkg/usr/lib/aarch64-linux-gnu/librga.so.2.1.0
          cd pkg/usr/lib/aarch64-linux-gnu
          ln -sf librga.so.2.1.0 librga.so.2
          ln -sf librga.so.2 librga.so
          cd -

          # Create pkg-config file
          printf 'prefix=/usr\nlibdir=${prefix}/lib/aarch64-linux-gnu\nincludedir=${prefix}/include\n\nName: librga\nDescription: Userspace interface to Rockchip RGA 2D accelerator\nVersion: 2.1.0\nLibs: -L${libdir} -lrga\nCflags: -I${includedir}\n' > pkg/usr/lib/aarch64-linux-gnu/pkgconfig/librga.pc

          tar -czf librga-aarch64.tar.gz -C pkg .
          echo "Package created: $(du -h librga-aarch64.tar.gz | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librga-aarch64
          path: librga-aarch64.tar.gz
          retention-days: 90

      - name: Update Latest Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          body: "Automated build from main branch. Commit: ${{ github.sha }}"
          artifacts: librga-aarch64.tar.gz
          allowUpdates: true
          prerelease: true
          makeLatest: true
          removeArtifacts: true

      - name: Create Tag Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: librga-aarch64.tar.gz
          generate_release_notes: true